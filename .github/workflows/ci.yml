name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel pytest pytest-cov

      - name: Install flowbook (compiles the C++ extension)
        run: pip install -e .

      - name: Run the test suite
        run: python -m pytest tests/ -v --cov=flowbook --cov-report=term-missing

      - name: Run matching engine benchmark (smoke test, not a perf gate)
        run: python benchmarks/bench_engine.py

      - name: Run ring buffer benchmark (smoke test, not a perf gate)
        run: python benchmarks/bench_ring_buffer.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check (non-blocking style pass)
        run: ruff check python/ tests/ benchmarks/ scripts/ --exit-zero
